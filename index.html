<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Dorm - Стратегия выживания</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 50%, #0a0505 100%);
            font-family: 'Courier New', 'Microsoft YaHei', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            border: 1px solid #8b0000;
        }

        .resources-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #0a0a0a;
            border-radius: 15px;
            flex-wrap: wrap;
            border-bottom: 2px solid #ff4500;
        }

        .resource {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            padding: 8px 20px;
            border-radius: 12px;
            color: #ffcc88;
            font-weight: bold;
            font-size: 18px;
            border-left: 4px solid #ff6600;
        }

        .resource span {
            color: #ffaa44;
            font-size: 26px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #1a0f05;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid #5a3a1a;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2a1a0a, #1a0f05);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.2s;
            border: 2px solid #5a4a2a;
            position: relative;
        }

        .tile:hover {
            background: linear-gradient(135deg, #4a2a1a, #2a1a0a);
            transform: scale(1.02);
            border-color: #ff6600;
        }

        .tile.has-building {
            background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
            border-color: #00aa44;
        }

        .building-icon {
            font-size: 32px;
        }

        .building-hp {
            font-size: 9px;
            color: #ff6666;
            margin-top: 2px;
        }

        .building-level {
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 10px;
            color: gold;
            font-weight: bold;
        }

        .upgrade-btn {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            padding: 2px 5px;
            background: #226622;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            white-space: nowrap;
        }

        .upgrade-btn:hover {
            background: #44aa44;
        }

        .build-panel {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ff6600;
        }

        .build-panel.active {
            display: block;
        }

        .build-panel h3 {
            margin: 0 0 10px 0;
            color: #ffaa66;
            text-align: center;
        }

        .build-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .build-buttons button {
            background: linear-gradient(135deg, #4a2a1a, #2a1a0a);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: 0.1s;
            font-size: 12px;
        }

        .build-buttons button:hover {
            background: linear-gradient(135deg, #7a4a2a, #4a2a1a);
        }

        .close-panel {
            display: block;
            margin: 10px auto 0;
            background: #660000;
            padding: 5px 20px;
        }

        .combat-log {
            background: #050505;
            height: 100px;
            overflow-y: auto;
            margin-top: 12px;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            color: #aa8866;
            font-family: monospace;
            border: 1px solid #331100;
        }

        .combat-log div {
            padding: 3px 0;
            border-bottom: 1px solid #221100;
        }

        .timer-bar {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 12px;
            padding: 10px;
            background: #1a0a0a;
            border-radius: 10px;
            color: #ff6666;
            border: 1px solid #ff3300;
        }

        .timer-bar span {
            font-size: 28px;
            color: #ffaa00;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #ff6600;
        }

        .overlay-content h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .overlay-content button {
            background: #ff4400;
            padding: 12px 30px;
            font-size: 18px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="resources-panel">
        <div class="resource">💤 СНЫ: <span id="dreams">250</span></div>
        <div class="resource">🛡️ СИЛА: <span id="totalDamage">0</span></div>
        <div class="resource">👻 ВОЛНА: <span id="wave">1</span>/10</div>
        <div class="resource">💀 ПРИЗРАКИ: <span id="ghostCount">0</span></div>
        <div class="resource">🏆 УБИТО: <span id="killed">0</span></div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="build-panel" id="buildPanel">
        <h3>🏗️ ВЫБЕРИ ПОСТРОЙКУ</h3>
        <div class="build-buttons">
            <button onclick="selectBuilding('bed')">🛌 Кровать (80)</button>
            <button onclick="selectBuilding('turret')">🔫 Турель (120)</button>
            <button onclick="selectBuilding('trap')">⚡ Ловушка (60)</button>
            <button onclick="selectBuilding('amplifier')">📡 Усилитель (150)</button>
            <button onclick="selectBuilding('door')">🚪 Дверь (100)</button>
        </div>
        <button class="close-panel" onclick="closeBuildPanel()">❌ ЗАКРЫТЬ</button>
    </div>

    <div class="combat-log" id="combatLog">
        <div>🎮 ИГРА НАЧАЛАСЬ! Стройте оборону...</div>
    </div>

    <div class="timer-bar">
        ⏳ ДО АТАКИ: <span id="timeLeft">30</span> сек
    </div>
</div>

<div id="winScreen" class="overlay hidden">
    <div class="overlay-content">
        <h2>🏆 ПОБЕДА!</h2>
        <p>Вы очистили общежитие от призраков!</p>
        <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
    </div>
</div>

<div id="loseScreen" class="overlay hidden">
    <div class="overlay-content">
        <h2>💀 ВЫ УМЕРЛИ</h2>
        <p>Призраки забрали ваши сны...</p>
        <button onclick="location.reload()">ПОПРОБОВАТЬ СНОВА</button>
    </div>
</div>

<script>
    let dreams = 250;
    let currentWave = 1;
    let gameActive = true;
    let preparationTime = 30;
    let waveInProgress = false;
    let ghosts = [];
    let buildings = [];
    let selectedTile = null;
    let totalKilled = 0;
    
    const BOARD_SIZE = 6;
    let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
    
    function addLog(msg) {
        const logDiv = document.getElementById('combatLog');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `🕯️ [${time}] ${msg}`;
        logDiv.insertBefore(entry, logDiv.firstChild);
        if (logDiv.children.length > 25) logDiv.removeChild(logDiv.lastChild);
    }
    
    function updateUI() {
        document.getElementById('dreams').innerText = Math.floor(dreams);
        document.getElementById('wave').innerText = `${currentWave}/10`;
        document.getElementById('ghostCount').innerText = ghosts.length;
        document.getElementById('killed').innerText = totalKilled;
        let totalDmg = buildings.filter(b => b.type === 'turret').reduce((s,b) => s + b.damage, 0);
        document.getElementById('totalDamage').innerText = totalDmg;
    }
    
    function spawnGhosts() {
        const count = Math.min(3 + Math.floor(currentWave / 1.2), 10);
        ghosts = [];
        for (let i = 0; i < count; i++) {
            ghosts.push({
                id: Math.random(),
                hp: 30 + currentWave * 10,
                maxHp: 30 + currentWave * 10,
                damage: 5 + Math.floor(currentWave / 1.5),
                x: 20 + Math.random() * 60,
                y: 20 + Math.random() * 60,
                attackCd: 0
            });
        }
        addLog(`🌊 ВОЛНА ${currentWave}! ${count} призраков!`);
        waveInProgress = true;
        updateUI();
    }
    
    function processCombat() {
        if (!waveInProgress || !gameActive) return;
        
        for (let i = 0; i < ghosts.length; i++) {
            const g = ghosts[i];
            if (g.attackCd > 0) { g.attackCd--; continue; }
            
            let closest = null;
            let closestDist = Infinity;
            for (let b of buildings) {
                const dist = Math.abs(b.x - g.x) + Math.abs(b.y - g.y);
                if (dist < closestDist) { closestDist = dist; closest = b; }
            }
            
            if (closest && closestDist < 2.5) {
                closest.hp -= g.damage;
                g.attackCd = 20;
                addLog(`👻 Призрак атаковал! -${g.damage}`);
                if (closest.hp <= 0) {
                    const idx = buildings.indexOf(closest);
                    if (idx > -1) { buildings.splice(idx,1); board[closest.y][closest.x] = null; }
                    addLog(`💔 Здание разрушено!`);
                }
            }
        }
        
        const before = ghosts.length;
        ghosts = ghosts.filter(g => g.hp > 0);
        if (before - ghosts.length > 0) { totalKilled += before - ghosts.length; updateUI(); }
        
        for (let b of buildings) {
            if (b.type === 'turret' && b.cd <= 0 && ghosts.length) {
                const target = ghosts[0];
                let dmg = b.damage;
                for (let a of buildings) {
                    if (a.type === 'amplifier' && Math.abs(a.x - b.x) + Math.abs(a.y - b.y) <= 2) dmg += 15;
                }
                target.hp -= dmg;
                b.cd = 25;
                addLog(`🔫 Турель: ${dmg} урона`);
                if (target.hp <= 0) { dreams += 25 + currentWave * 4; addLog(`💀 +${25+currentWave*4} снов`); updateUI(); }
            }
            if (b.type === 'trap' && b.cd <= 0 && ghosts.length) {
                for (let g of ghosts) {
                    if (Math.abs(g.x - b.x) + Math.abs(g.y - b.y) <= 1.5) {
                        g.hp -= 15 + b.level * 5;
                        b.cd = 40;
                        addLog(`⚡ Ловушка!`);
                        break;
                    }
                }
            }
            if (b.type === 'door' && b.cd <= 0 && ghosts.length) {
                for (let g of ghosts) {
                    if (Math.abs(g.x - b.x) + Math.abs(g.y - b.y) <= 1) {
                        g.hp -= 8 + b.level * 3;
                        b.cd = 30;
                        addLog(`🚪 Дверь контратакует!`);
                        break;
                    }
                }
            }
            if (b.cd > 0) b.cd--;
            if (b.type === 'bed') dreams += 2 + b.level;
        }
        
        const hasBed = buildings.some(b => b.type === 'bed');
        if (!hasBed && gameActive) { gameActive = false; document.getElementById('loseScreen').classList.remove('hidden'); addLog(`💀 Нет кровати - поражение!`); }
        
        if (currentWave >= 10 && ghosts.length === 0 && waveInProgress) {
            waveInProgress = false; gameActive = false;
            document.getElementById('winScreen').classList.remove('hidden');
            addLog(`🏆 ПОБЕДА!`);
        }
        
        if (ghosts.length === 0 && waveInProgress && currentWave < 10) {
            waveInProgress = false; currentWave++; preparationTime = 25;
            addLog(`✨ ВОЛНА ${currentWave-1} ПРОЙДЕНА!`);
            updateUI();
        }
        
        updateUI();
        renderBoard();
    }
    
    function buildOnTile(x, y, type) {
        if (!gameActive) return false;
        let cost = 0, obj = null;
        switch(type) {
            case 'bed': cost = 80; obj = { type: 'bed', x, y, hp: 60, maxHp: 60, level: 1, cd: 0 }; break;
            case 'turret': cost = 120; obj = { type: 'turret', x, y, hp: 50, maxHp: 50, damage: 18, level: 1, cd: 0 }; break;
            case 'trap': cost = 60; obj = { type: 'trap', x, y, hp: 40, maxHp: 40, level: 1, cd: 0 }; break;
            case 'amplifier': cost = 150; obj = { type: 'amplifier', x, y, hp: 45, maxHp: 45, level: 1, cd: 0 }; break;
            case 'door': cost = 100; obj = { type: 'door', x, y, hp: 100, maxHp: 100, level: 1, cd: 0 }; break;
        }
        if (dreams >= cost && obj) {
            dreams -= cost;
            buildings.push(obj);
            board[y][x] = obj;
            addLog(`✅ Построен ${type}`);
            updateUI(); renderBoard();
            return true;
        } else { addLog(`❌ Не хватает снов! Нужно ${cost}`); return false; }
    }
    
    function upgradeBuilding(x, y) {
        const b = board[y][x];
        if (!b || !gameActive) return;
        const cost = 50 + b.level * 30;
        if (dreams >= cost) {
            dreams -= cost; b.level++;
            b.hp += 25; b.maxHp += 25;
            if (b.type === 'turret') b.damage += 7;
            addLog(`⬆️ Улучшен до ${b.level} уровня!`);
            updateUI(); renderBoard();
        } else { addLog(`💰 Нужно ${cost} снов для улучшения`); }
    }
    
    function renderBoard() {
        const boardDiv = document.getElementById('gameBoard');
        boardDiv.innerHTML = '';
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const b = board[y][x];
                if (b) {
                    let icon = { bed:'🛌', turret:'🔫', trap:'⚡', amplifier:'📡', door:'🚪' }[b.type];
                    tile.innerHTML = `<div class="building-icon">${icon}</div><div class="building-hp">❤️${b.hp}/${b.maxHp}</div><div class="building-level">Lv${b.level}</div><button class="upgrade-btn" onclick="upgradeBuilding(${x},${y})">⬆️ ${50+b.level*30}</button>`;
                    tile.classList.add('has-building');
                } else {
                    tile.innerHTML = `<div style="font-size:28px;">⬜</div><div style="font-size:9px;">пусто</div>`;
                    tile.onclick = () => { selectedTile = {x,y}; document.getElementById('buildPanel').classList.add('active'); };
                }
                boardDiv.appendChild(tile);
            }
        }
    }
    
    function closeBuildPanel() { document.getElementById('buildPanel').classList.remove('active'); selectedTile = null; }
    function selectBuilding(type) { if (selectedTile) { buildOnTile(selectedTile.x, selectedTile.y, type); closeBuildPanel(); } }
    
    let gameInterval;
    function startGameLoop() {
        gameInterval = setInterval(() => {
            if (!gameActive) return;
            if (!waveInProgress && preparationTime > 0) {
                preparationTime--;
                document.getElementById('timeLeft').innerText = preparationTime;
                if (preparationTime <= 0) spawnGhosts();
            }
            if (waveInProgress) processCombat();
            updateUI();
        }, 1000);
    }
    
    function initGame() {
        dreams = 250; currentWave = 1; gameActive = true; preparationTime = 30; waveInProgress = false;
        ghosts = []; buildings = []; totalKilled = 0;
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        buildOnTile(2,2,'bed'); buildOnTile(3,3,'turret'); buildOnTile(1,4,'door');
        renderBoard(); updateUI(); startGameLoop();
        addLog('🎮 ИГРА НАЧАТА! Стройте оборону!');
    }
    
    initGame();
</script>
</body>
</html>
