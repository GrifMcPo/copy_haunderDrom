<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Dorm - Полная стратегия выживания</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 50%, #0a0505 100%);
            font-family: 'Courier New', 'Microsoft YaHei', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            border: 1px solid #8b0000;
        }

        /* Панель ресурсов */
        .resources-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #0a0a0a;
            border-radius: 15px;
            flex-wrap: wrap;
            border-bottom: 2px solid #ff4500;
        }

        .resource {
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            padding: 8px 20px;
            border-radius: 12px;
            color: #ffcc88;
            font-weight: bold;
            font-size: 18px;
            border-left: 4px solid #ff6600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .resource span {
            color: #ffaa44;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 0 0 5px #ff6600;
        }

        /* Игровое поле 6x6 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #1a0f05;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid #5a3a1a;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2a1a0a, #1a0f05);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.2s;
            border: 2px solid #5a4a2a;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .tile:hover {
            background: linear-gradient(135deg, #4a2a1a, #2a1a0a);
            transform: scale(1.02);
            border-color: #ff6600;
        }

        .tile.has-building {
            background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
            border-color: #00aa44;
        }

        .building-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 5px rgba(255,255,0,0.5));
        }

        .building-hp {
            font-size: 9px;
            color: #ff6666;
            margin-top: 2px;
        }

        .building-level {
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 10px;
            color: gold;
            font-weight: bold;
        }

        .upgrade-btn {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            padding: 2px 5px;
            background: #226622;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            white-space: nowrap;
        }

        .upgrade-btn:hover {
            background: #44aa44;
        }

        /* Панель строительства */
        .build-panel {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ff6600;
        }

        .build-panel.active {
            display: block;
        }

        .build-panel h3 {
            margin: 0 0 10px 0;
            color: #ffaa66;
            text-align: center;
        }

        .build-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .build-buttons button {
            background: linear-gradient(135deg, #4a2a1a, #2a1a0a);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: 0.1s;
            font-size: 12px;
        }

        .build-buttons button:hover {
            background: linear-gradient(135deg, #7a4a2a, #4a2a1a);
            transform: scale(1.02);
        }

        .close-panel {
            display: block;
            margin: 10px auto 0;
            background: #660000;
            padding: 5px 20px;
        }

        /* Лог боя */
        .combat-log {
            background: #050505;
            height: 100px;
            overflow-y: auto;
            margin-top: 12px;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            color: #aa8866;
            font-family: monospace;
            border: 1px solid #331100;
        }

        .combat-log div {
            padding: 3px 0;
            border-bottom: 1px solid #221100;
        }

        /* Таймер */
        .timer-bar {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 12px;
            padding: 10px;
            background: #1a0a0a;
            border-radius: 10px;
            color: #ff6666;
            border: 1px solid #ff3300;
        }

        .timer-bar span {
            font-size: 28px;
            color: #ffaa00;
        }

        /* Экраны победы/поражения */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #ff6600;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }

        .overlay-content h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .overlay-content button {
            background: #ff4400;
            padding: 12px 30px;
            font-size: 18px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        /* Анимация атаки */
        @keyframes attackFlash {
            0% { text-shadow: 0 0 0 red; }
            100% { text-shadow: 0 0 20px red; }
        }

        .attack-animation {
            animation: attackFlash 0.2s;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="resources-panel">
        <div class="resource">💤 СНЫ: <span id="dreams">250</span></div>
        <div class="resource">🛡️ СИЛА: <span id="totalDamage">0</span></div>
        <div class="resource">👻 ВОЛНА: <span id="wave">1</span>/10</div>
        <div class="resource">💀 ПРИЗРАКИ: <span id="ghostCount">0</span></div>
        <div class="resource">🏆 УБИТО: <span id="killed">0</span></div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="build-panel" id="buildPanel">
        <h3>🏗️ ВЫБЕРИ ПОСТРОЙКУ</h3>
        <div class="build-buttons">
            <button onclick="selectBuilding('bed')">🛌 Кровать (80💤)</button>
            <button onclick="selectBuilding('turret')">🔫 Турель (120💤)</button>
            <button onclick="selectBuilding('trap')">⚡ Ловушка (60💤)</button>
            <button onclick="selectBuilding('amplifier')">📡 Усилитель (150💤)</button>
            <button onclick="selectBuilding('door')">🚪 Укрепдверь (100💤)</button>
        </div>
        <button class="close-panel" onclick="closeBuildPanel()">❌ ЗАКРЫТЬ</button>
    </div>

    <div class="combat-log" id="combatLog">
        <div>🎮 ИГРА НАЧАЛАСЬ! Постройте оборону...</div>
    </div>

    <div class="timer-bar">
        ⏳ ДО ПОЯВЛЕНИЯ ПРИЗРАКОВ: <span id="timeLeft">30</span> сек
    </div>
</div>

<div id="winScreen" class="overlay hidden">
    <div class="overlay-content">
        <h2>🏆 ПОБЕДА! 🏆</h2>
        <p>Вы выжили и очистили общежитие от призраков!</p>
        <p>Волн пройдено: 10</p>
        <button onclick="location.reload()">🔁 ИГРАТЬ СНОВА</button>
    </div>
</div>

<div id="loseScreen" class="overlay hidden">
    <div class="overlay-content">
        <h2>💀 ВЫ УМЕРЛИ 💀</h2>
        <p>Призраки забрали ваши сны...</p>
        <button onclick="location.reload()">🔄 ПОПРОБОВАТЬ СНОВА</button>
    </div>
</div>

<script>
    // ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
    let dreams = 250;
    let currentWave = 1;
    let gameActive = true;
    let preparationTime = 30;
    let waveInProgress = false;
    let ghosts = [];
    let buildings = [];
    let selectedTile = null;
    let selectedBuildingType = null;
    let totalKilled = 0;
    
    const BOARD_SIZE = 6;
    let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function addLog(message) {
        const logDiv = document.getElementById('combatLog');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `🕯️ [${time}] ${message}`;
        logDiv.insertBefore(entry, logDiv.firstChild);
        if (logDiv.children.length > 25) {
            logDiv.removeChild(logDiv.lastChild);
        }
    }
    
    function updateUI() {
        document.getElementById('dreams').innerText = Math.floor(dreams);
        document.getElementById('wave').innerText = `${currentWave}/10`;
        document.getElementById('ghostCount').innerText = ghosts.length;
        document.getElementById('killed').innerText = totalKilled;
        
        let totalDmg = 0;
        buildings.forEach(b => {
            if (b.type === 'turret') totalDmg += b.damage;
        });
        document.getElementById('totalDamage').innerText = totalDmg;
    }
    
    // ==================== ГЕНЕРАЦИЯ ПРИЗРАКОВ ====================
    function spawnGhosts() {
        const ghostCount = Math.min(3 + Math.floor(currentWave / 1.2), 10);
        ghosts = [];
        
        for (let i = 0; i < ghostCount; i++) {
            ghosts.push({
                id: Math.random(),
                hp: 30 + currentWave * 10,
                maxHp: 30 + currentWave * 10,
                damage: 5 + Math.floor(currentWave / 1.5),
                x: 20 + Math.random() * 60,
                y: 20 + Math.random() * 60,
                attackCooldown: 0,
                type: currentWave > 5 ? 'elite' : 'normal'
            });
        }
        
        addLog(`🌊 ВОЛНА ${currentWave}! Появилось ${ghostCount} призраков! ${currentWave > 5 ? 'Появились элитные призраки!' : ''}`);
        waveInProgress = true;
        updateUI();
    }
    
    // ==================== БОЕВАЯ СИСТЕМА ====================
    function processCombat() {
        if (!waveInProgress || !gameActive) return;
        
        // Атака призраков на здания
        for (let i = 0; i < ghosts.length; i++) {
            const ghost = ghosts[i];
            if (ghost.attackCooldown > 0) {
                ghost.attackCooldown--;
                continue;
            }
            
            // Поиск ближайшего здания
            let closestBuilding = null;
            let closestDistance = Infinity;
            
            for (let building of buildings) {
                const dist = Math.abs(building.x - ghost.x) + Math.abs(building.y - ghost.y);
                if (dist < closestDistance) {
                    closestDistance = dist;
                    closestBuilding = building;
                }
            }
            
            if (closestBuilding && closestDistance < 2.5) {
                const actualDamage = ghost.damage;
                closestBuilding.hp -= actualDamage;
                ghost.attackCooldown = 20;
                addLog(`👻 Призрак атаковал ${getBuildingName(closestBuilding.type)}! -${actualDamage}❤️`);
                
                if (closestBuilding.hp <= 0) {
                    const index = buildings.indexOf(closestBuilding);
                    if (index > -1) {
                        buildings.splice(index, 1);
                        board[closestBuilding.y][closestBuilding.x] = null;
                        addLog(`💔 ${getBuildingName(closestBuilding.type)} РАЗРУШЕН!`);
                    }
                }
            }
        }
        
        // Удаление мертвых призраков
        const beforeCount = ghosts.length;
        ghosts = ghosts.filter(g => g.hp > 0);
        const killedThisTick = beforeCount - ghosts.length;
        if (killedThisTick > 0) {
            totalKilled += killedThisTick;
            updateUI();
        }
        
        // Атака турелей
        for (let building of buildings) {
            if (building.type === 'turret' && building.cooldown <= 0 && ghosts.length > 0) {
                const target = ghosts[0];
                let damage = building.damage;
                
                // Поиск усилителей рядом
                for (let amp of buildings) {
                    if (amp.type === 'amplifier' && Math.abs(amp.x - building.x) + Math.abs(amp.y - building.y) <= 2) {
                        damage += 15;
                    }
                }
                
                target.hp -= damage;
                building.cooldown = 25;
                addLog(`🔫 Турель выстрелила! Урон: ${damage}`);
                
                if (target.hp <= 0) {
                    const reward = 25 + currentWave * 4;
                    dreams += reward;
                    addLog(`💀 Призрак уничтожен! +${reward} снов`);
                    updateUI();
                }
            }
            
            // Атака ловушек
            if (building.type === 'trap' && building.cooldown <= 0 && ghosts.length > 0) {
                for (let ghost of ghosts) {
                    if (Math.abs(ghost.x - building.x) + Math.abs(ghost.y - building.y) <= 1.5) {
                        const trapDamage = 15 + building.level * 5;
                        ghost.hp -= trapDamage;
                        building.cooldown = 40;
                        addLog(`⚡ Ловушка сработала! Урон: ${trapDamage}`);
                        break;
                    }
                }
            }
            
            // Контратака укрепдвери
            if (building.type === 'door' && building.cooldown <= 0 && ghosts.length > 0) {
                for (let ghost of ghosts) {
                    if (Math.abs(ghost.x - building.x) + Math.abs(ghost.y - building.y) <= 1) {
                        const doorDamage = 8 + building.level * 3;
                        ghost.hp -= doorDamage;
                        building.cooldown = 30;
                        addLog(`🚪 Дверь отбила атаку! Урон: ${doorDamage}`);
                        break;
                    }
                }
            }
            
            if (building.cooldown > 0) building.cooldown--;
        }
        
        // Пассивный доход от кроватей
        for (let building of buildings) {
            if (building.type === 'bed') {
                dreams += 2 + building.level;
            }
        }
        
        // Проверка наличия кровати
        const hasBed = buildings.some(b => b.type === 'bed');
        if (!hasBed && gameActive) {
            gameActive = false;
            document.getElementById('loseScreen').classList.remove('hidden');
            addLog(`💀 У вас нет кровати! Призраки победили!`);
        }
        
        // Проверка победы
        if (currentWave >= 10 && ghosts.length === 0 && waveInProgress) {
            waveInProgress = false;
            gameActive = false;
            document.getElementById('winScreen').classList.remove('hidden');
            addLog(`🏆 ВЫ ОЧИСТИЛИ ОБЩЕЖИТЬЕ! ПОБЕДА!`);
        }
        
        // Переход на следующую волну
        if (ghosts.length === 0 && waveInProgress && currentWave < 10) {
            waveInProgress = false;
            currentWave++;
            preparationTime = 25;
            addLog(`✨ ВОЛНА ${currentWave-1} ПРОЙДЕНА! Готовьтесь к следующей...`);
            updateUI();
        }
        
        updateUI();
        renderBoard();
    }
    
    function getBuildingName(type) {
        const names = {
            'bed': 'Кровать',
            'turret': 'Турель',
            'trap': 'Ловушка',
            'amplifier': 'Усилитель',
            'door': 'Дверь'
        };
        return names[type] || type;
    }
    
    // ==================== СТРОИТЕЛЬСТВО ====================
    function buildOnTile(x, y, type) {
        if (!gameActive) return false;
        
        let cost = 0;
        let buildingObj = null;
        
        switch(type) {
            case 'bed':
                cost = 80;
                buildingObj = { type: 'bed', x, y, hp: 60, maxHp: 60, level: 1, cooldown: 0 };
                break;
            case 'turret':
                cost = 120;
                buildingObj = { type: 'turret', x, y, hp: 50, maxHp: 50, damage: 18, level: 1, cooldown: 0 };
                break;
            case 'trap':
                cost = 60;
                buildingObj = { type: 'trap', x, y, hp: 40, maxHp: 40, level: 1, cooldown: 0 };
                break;
            case 'amplifier':
                cost = 150;
                buildingObj = { type: 'amplifier', x, y, hp: 45, maxHp: 45, level: 1, cooldown: 0 };
                break;
            case 'door':
                cost = 100;
                buildingObj = { type: 'door', x, y, hp: 100, maxHp: 100, level: 1, cooldown: 0 };
                break;
        }
        
        if (dreams >= cost && buildingObj) {
            dreams -= cost;
            buildings.push(buildingObj);
            board[y][x] = buildingObj;
            addLog(`✅ ПОСТРОЕНО: ${getBuildingName(type)} на клетке (${x+1},${y+1})`);
            updateUI();
            renderBoard();
            return true;
        } else {
            addLog(`❌ НЕ ХВАТАЕТ СНОВ для ${getBuildingName(type)}! Нужно: ${cost}`);
            return false;
        }
    }
    
    // ==================== УЛУЧШЕНИЕ ЗДАНИЙ ====================
    function upgradeBuilding(x, y) {
        const building = board[y][x];
        if (!building || !gameActive) return;
        
        const cost = 50 + building.level * 30;
        if (dreams >= cost) {
            dreams -= cost;
            building.level++;
            building.hp += 25;
            building.maxHp += 25;
            
            if (building.type === 'turret') building.damage += 7;
            if (building.type === 'door') building.maxHp += 30;
            
            addLog(`⬆️ ${getBuildingName(building.type)} УЛУЧШЕН до ${building.level} уровня!`);
            updateUI();
            renderBoard();
        } else {
            addLog(`💰 НЕ ХВАТАЕТ СНОВ для улучшения! Нужно: ${cost}`);
        }
    }
    
    // ==================== ОТРИСОВКА ПОЛЯ ====================
    function renderBoard() {
        const boardDiv = document.getElementById('gameBoard');
        boardDiv.innerHTML = '';
        
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const building = board[y][x];
                
                if (building) {
                    let icon = '';
                    switch(building.type) {
                        case 'bed': icon = '🛌'; break;
                        case 'turret': icon = '🔫'; break;
                        case 'trap': icon = '⚡'; break;
                        case 'amplifier': icon = '📡'; break;
                        case 'door': icon = '🚪'; break;
                    }
                    
                    const hpPercent = (building.hp / building.maxHp) * 100;
                    const hpColor = hpPercent > 60 ? '#88ff88' : (hpPercent > 30 ? '#ffaa44' : '#ff4444');
                    
                    tile.innerHTML = `
                        <div class="building-icon">${icon}</div>
                        <div class="building-hp" style="color: ${hpColor}">❤️${Math.max(0, building.hp)}/${building.maxHp}</div>
                        <div class="building-level">Lv${building.level}</div>
                        <button class="upgrade-btn" onclick="upgradeBuilding(${x},${y})">⬆️ Улучшить (${50 + building.level * 30})</button>
                    `;
                    tile.classList.add('has-building');
                } else {
                    tile.innerHTML = `
                        <div style="font-size: 28px;">⬜</div>
                        <div style="font-size: 9px; color: #886644;">пусто</div>
                    `;
                    tile.onclick = () => openBuildPanel(x, y);
                }
                
                boardDiv.appendChild(tile);
            }
        }
    }
    
    function openBuildPanel(x, y) {
        if (!gameActive) return;
        selectedTile = { x, y };
        document.getElementById('buildPanel').classList.add('active');
    }
    
    function closeBuildPanel() {
        document.getElementById('buildPanel').classList.remove('active');
        selectedTile = null;
    }
    
    function selectBuilding(type) {
        if (selectedTile) {
            buildOnTile(selectedTile.x, selectedTile.y, type);
            closeBuildPanel();
        }
    }
    
    // ==================== ИГРОВОЙ ЦИКЛ ====================
    let gameInterval;
    
    function startGameLoop() {
        gameInterval = setInterval(() => {
            if (!gameActive) return;
            
            if (!waveInProgress && preparationTime > 0) {
                preparationTime--;
                document.getElementById('timeLeft').innerText = preparationTime;
                
                if (preparationTime <= 0) {
                    spawnGhosts();
                }
            }
            
            if (waveInProgress) {
                processCombat();
            }
            
            updateUI();
        }, 1000);
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function initGame() {
        dreams = 250;
        currentWave = 1;
        gameActive = true;
        preparationTime = 30;
        waveInProgress = false;
        ghosts = [];
        buildings = [];
        totalKilled = 0;
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        
        // Стартовые здания
        buildOnTile(2, 2, 'bed');
        buildOnTile(3, 3, 'turret');
        buildOnTile(1, 4, 'door');
        
        renderBoard();
        updateUI();
        startGameLoop();
        addLog('🎮 ИГРА НАЧАТА! Стройте оборону и выживайте!');
        addLog('💡 СОВЕТ: Улучшайте турели и стройте усилители рядом!');
    }
    
    initGame();
</script>
</body>
</html>
